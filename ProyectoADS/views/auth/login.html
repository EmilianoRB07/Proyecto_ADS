<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HospitalNet - Inicio de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/ProyectoADS/public/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="login-container w-100" style="max-width: 420px; background: #ffffff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        
        <div class="text-center mb-3" style="font-size: 3rem;">🏥</div>
        <h3 class="text-center fw-bold mb-1">HospitalNet</h3>
        <p class="text-muted text-center small mb-4">Sistema de Gestión Médica Interna</p>
        
        <div id="alert-container"></div>

        <form id="form-login" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label small fw-semibold">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="admin@hospitalnet.com" required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                Ingresar al Sistema
            </button>
            <div class="text-center mt-3">
                <a href="recuperar.html" class="small text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
        
    </div>
</div>

<script src="/ProyectoADS/public/js/auth.js"></script>
</body>
</html>
